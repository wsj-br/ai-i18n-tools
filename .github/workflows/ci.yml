name: CI

# Use Node 24 for JS-based actions (checkout, pnpm/setup) until they default to 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_as_latest:
        description: "Publish to npm with the 'latest' dist-tag (manual runs only; use after fixing the branch)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  publish:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_as_latest == 'true')
    runs-on: ubuntu-latest
    # OIDC for npm trusted publishing (replaces long-lived NPM_TOKEN for the publish step).
    # Requires npm CLI ≥ 11.5.1 and Node ≥ 22.14 — see https://docs.npmjs.com/trusted-publishers/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Node’s bundled npm is often < 11.5.1; trusted publishing requires npm ≥ 11.5.1.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Publish to npm (OIDC)
        run: pnpm publish --no-git-checks --tag latest
