name: CI

# Use Node 24 for JS-based actions (checkout, pnpm/setup) until they default to 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_as_latest:
        description: "Publish to npm with the 'latest' dist-tag (manual runs only; use after fixing the branch)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  publish:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_as_latest == 'true')
    runs-on: ubuntu-latest
    # Optional: Settings → Environments → `npm` — add protection rules, required reviewers, or wait timers before publish.
    environment: npm
    # Publishing: prefer npm Trusted Publishers (OIDC) — configure on npmjs with workflow file `ci.yml`
    # (name must match exactly). If OIDC is not set up or the workflow name mismatches, set
    # `NPM_TOKEN` (granular publish token) as a repo secret. See https://docs.npmjs.com/trusted-publishers/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org
          # Used when publishing with a classic token; also seeds .npmrc for the registry.
          token: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Trusted publishing needs npm ≥ 11.5.1 (Node 22’s default npm is older).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      # `--ignore-scripts`: skip `prepublishOnly` (clean/build/test); the matrix `build` job already did that.
      # `--provenance`: supply-chain attestation (public repos; npm also attests when using Trusted Publishing).
      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
